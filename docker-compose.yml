volumes:
  db_data:
    driver: local
  moodle_data:
    driver: local
  portal_db_data:
    driver: local

networks:
  moodle_network:
    driver: bridge
  acapy_network:
    driver: bridge
  # Red para el proxy inverso de Dokploy (Traefik)
  dokploy-network:
    external: true
  # Red creada por VON Network (externa)
  von_von:
    external: true

services:
  # ===================================================================
  # Servicio ACA-Py Agent (Hyperledger Indy / VON Network)
  # ===================================================================
  acapy-agent:
    build:
      context: ./backend/acapy
      dockerfile: Dockerfile.acapy
    container_name: acapy-agent
    environment:
      - GENESIS_URL=${ACAPY_GENESIS_URL}
      - ACAPY_DID_SEED=${ACAPY_DID_SEED}
      - ACAPY_ENDPOINT=https://${ACAPY_DOMAIN}
      - ACAPY_WALLET_NAME=${ACAPY_WALLET_NAME}
      - ACAPY_WALLET_KEY=${ACAPY_WALLET_KEY}
    entrypoint: aca-py
    command:
      - start
      - --auto-provision
      - --seed
      - ${ACAPY_DID_SEED}
      - --admin
      - "0.0.0.0"
      - "8020"
      - --admin-insecure-mode
      - --endpoint
      - ${ACAPY_ENDPOINT}
      - --inbound-transport
      - http
      - "0.0.0.0"
      - "8021"
      - --outbound-transport
      - http
      - --genesis-url
      - ${ACAPY_GENESIS_URL}
      - --wallet-type
      - askar
      - --wallet-name
      - ${ACAPY_WALLET_NAME}
      - --wallet-key
      - ${ACAPY_WALLET_KEY}
      - --log-level
      - INFO
      - --auto-accept-requests
      - --auto-accept-invites
      - --auto-ping-connection
    networks:
      - acapy_network
      - dokploy-network
      - von_von  # Conectar a la red de VON Network externa
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/status/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.acapy-public.rule=Host(`${ACAPY_DOMAIN}`)"
      - "traefik.http.routers.acapy-public.entrypoints=websecure"
      - "traefik.http.routers.acapy-public.tls.certresolver=myresolver"
      - "traefik.http.services.acapy-public.loadbalancer.server.port=8021"
      - "traefik.http.routers.acapy-admin.rule=Host(`${ACAPY_ADMIN_DOMAIN}`)"
      - "traefik.http.routers.acapy-admin.entrypoints=websecure"
      - "traefik.http.routers.acapy-admin.tls.certresolver=myresolver"
      - "traefik.http.services.acapy-admin.loadbalancer.server.port=8020"

  # ===================================================================
  # Controller Python
  # ===================================================================
  python-controller:
    build:
      context: ./backend
      dockerfile: Dockerfile.controller
    container_name: python-controller
    # El puerto se expone a través de Traefik
    environment:
      - ISSUER_URL=${ISSUER_URL}
      - ACAPY_ADMIN_URL=http://acapy-agent:8020
      - ACAPY_PUBLIC_URL=https://${ACAPY_DOMAIN} # El endpoint público del agente
      - OPENID_PRIVATE_KEY_PATH=/run/secrets/openid_private_key
      - OPENID_PUBLIC_KEY_PATH=/run/secrets/openid_public_key
      # Capa de blockchain (ver backend/controller/blockchain/factory.py)
      - BLOCKCHAIN_DRIVER=${BLOCKCHAIN_DRIVER:-indy}
      - BLOCKCHAIN_NETWORK_NAME=${BLOCKCHAIN_NETWORK_NAME:-VON Network (Hyperledger Indy)}
      - BLOCKCHAIN_EXPLORER_URL=${BLOCKCHAIN_EXPLORER_URL:-https://ledger.utnpf.site}
      # Portal de Credenciales
      - PORTAL_DB_URL=postgresql://${PORTAL_DB_USER}:${PORTAL_DB_PASSWORD}@portal-db:5432/${PORTAL_DB_NAME}
      - MOODLE_DB_READONLY_URL=postgresql://${MOODLE_DB_READONLY_USER}:${MOODLE_DB_READONLY_PASSWORD}@moodle-db:5432/${MOODLE_DB_NAME}
      - PORTAL_JWT_SECRET=${PORTAL_JWT_SECRET}
      - MOODLE_PORTAL_JWT_SECRET=${MOODLE_PORTAL_JWT_SECRET}
      - PORTAL_FRONTEND_URL=${PORTAL_FRONTEND_URL}
    volumes:
      - ${OPENID_PRIVATE_KEY_PATH}:/run/secrets/openid_private_key:ro
      - ${OPENID_PUBLIC_KEY_PATH}:/run/secrets/openid_public_key:ro
    depends_on:
      acapy-agent:
        condition: service_healthy
      portal-db:
        condition: service_started
    networks:
      - moodle_network
      - acapy_network
      - dokploy-network # Conectar a la red del proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.controller.rule=Host(`${CONTROLLER_DOMAIN}`)"
      - "traefik.http.routers.controller.entrypoints=websecure"
      - "traefik.http.routers.controller.tls.certresolver=myresolver" # Dokploy gestiona esto
      - "traefik.http.services.controller.loadbalancer.server.port=3000"

  # ===================================================================
  # Aplicación Moodle
  # ===================================================================
  moodle-app:
    build:
      context: ./moodle
      dockerfile: Dockerfile
    container_name: moodle-app
    # El puerto se expone a través de Traefik
    environment:
      MOODLE_DB_TYPE: pgsql
      MOODLE_DB_HOST: moodle-db
      MOODLE_DB_PORT: 5432
      MOODLE_DB_NAME: ${MOODLE_DB_NAME}
      MOODLE_DB_USER: ${MOODLE_DB_USER}
      MOODLE_DB_PASS: ${MOODLE_DB_PASSWORD}
      # Fuerza HTTPS
      MOODLECFG_wwwroot: ${MOODLECFG_WWWROOT}
      MOODLECFG_sslproxy: ${MOODLECFG_SSLPROXY}

    volumes:
      - moodle_data:/var/www/moodledata
    depends_on:
      - moodle-db
    networks:
      - moodle_network
      - dokploy-network # Conectar a la red del proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.moodle.rule=Host(`${MOODLE_DOMAIN}`)"
      - "traefik.http.routers.moodle.entrypoints=websecure"
      - "traefik.http.routers.moodle.tls.certresolver=myresolver" # Dokploy gestiona esto
      - "traefik.http.services.moodle.loadbalancer.server.port=80"

  # ===================================================================
  # Base de datos de Moodle
  # ===================================================================
  moodle-db:
    image: postgres:15-alpine
    container_name: moodle-db
    environment:
      POSTGRES_DB: ${MOODLE_DB_NAME}
      POSTGRES_USER: ${MOODLE_DB_USER}
      POSTGRES_PASSWORD: ${MOODLE_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --lc-collate=C --lc-ctype=C'
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/moodle-db-init:/docker-entrypoint-initdb.d:ro
    networks:
      - moodle_network
    restart: unless-stopped
    ports:
      - "${MOODLE_DB_PORT_EXT}:5432"

  # ===================================================================
  # Base de datos del Portal de Credenciales
  # ===================================================================
  portal-db:
    image: postgres:15-alpine
    container_name: portal-db
    environment:
      POSTGRES_DB: ${PORTAL_DB_NAME}
      POSTGRES_USER: ${PORTAL_DB_USER}
      POSTGRES_PASSWORD: ${PORTAL_DB_PASSWORD}
    volumes:
      - portal_db_data:/var/lib/postgresql/data
    networks:
      - moodle_network
    restart: unless-stopped
