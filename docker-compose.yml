volumes:
  db_data:
    driver: local
  moodle_data:
    driver: local
  portal_db_data:
    driver: local
  besu_data:
    driver: local
  blockscout_db_data:
    driver: local

networks:
  moodle_network:
    driver: bridge
  besu_network:
    driver: bridge
  # Red para el proxy inverso de Dokploy (Traefik)
  dokploy-network:
    external: true

services:
  # ===================================================================
  # Nodo Hyperledger Besu (Blockchain EVM - Smart Contracts)
  # ===================================================================
  besu-node:
    image: hyperledger/besu:24.12.2
    container_name: besu-node
    environment:
      - BESU_NETWORK=dev
      - BESU_MINER_ENABLED=true
      - BESU_MINER_COINBASE=0xfe3b557e8fb62b89f4916b721be55ceb828dbd73
      - BESU_RPC_HTTP_ENABLED=true
      - BESU_RPC_HTTP_HOST=0.0.0.0
      - BESU_RPC_HTTP_PORT=8545
      - BESU_RPC_HTTP_CORS_ORIGINS=all
      - BESU_RPC_HTTP_API=ETH,NET,WEB3,DEBUG,ADMIN,TXPOOL,TRACE
      - BESU_HOST_ALLOWLIST=*
      - BESU_DATA_PATH=/opt/besu/data
      # Historial completo para Blockscout (default=512 causa WARN)
      - BESU_BONSAI_HISTORICAL_BLOCK_LIMIT=0
    volumes:
      - besu_data:/opt/besu/data
    ports:
      - "8545:8545"
    networks:
      - besu_network
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8545'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.besu.rule=Host(`${BESU_RPC_DOMAIN}`)"
      - "traefik.http.routers.besu.entrypoints=websecure"
      - "traefik.http.routers.besu.tls.certresolver=letsencrypt"
      - "traefik.http.services.besu.loadbalancer.server.port=8545"

  # ===================================================================
  # Blockscout — Blockchain Explorer
  # ===================================================================
  blockscout-db:
    image: postgres:15-alpine
    container_name: blockscout-db
    shm_size: 256m
    environment:
      POSTGRES_DB: blockscout
      POSTGRES_USER: blockscout
      POSTGRES_PASSWORD: ${BLOCKSCOUT_DB_PASSWORD}
    volumes:
      - blockscout_db_data:/var/lib/postgresql/data
    networks:
      - besu_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  blockscout-redis:
    image: redis:alpine
    container_name: blockscout-redis
    command: redis-server
    networks:
      - besu_network
    restart: unless-stopped

  blockscout-backend:
    image: ghcr.io/blockscout/blockscout:latest
    pull_policy: always
    container_name: blockscout-backend
    restart: always
    stop_grace_period: 5m
    depends_on:
      blockscout-db:
        condition: service_healthy
      blockscout-redis:
        condition: service_started
      besu-node:
        condition: service_healthy
    command: sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    environment:
      # ── Nodo RPC ──
      ETHEREUM_JSONRPC_VARIANT: besu
      ETHEREUM_JSONRPC_HTTP_URL: http://besu-node:8545
      ETHEREUM_JSONRPC_TRACE_URL: http://besu-node:8545
      ETHEREUM_JSONRPC_TRANSPORT: http
      CHAIN_ID: '2018'
      # ── Base de datos ──
      DATABASE_URL: postgresql://blockscout:${BLOCKSCOUT_DB_PASSWORD}@blockscout-db:5432/blockscout
      ECTO_USE_SSL: 'false'
      # ── Secreto de la app ──
      SECRET_KEY_BASE: ${BLOCKSCOUT_SECRET_KEY_BASE}
      # ── Configuración de rendimiento (optimizado para VPS ARM64) ──
      POOL_SIZE: 40
      POOL_SIZE_API: 10
      INDEXER_MEMORY_LIMIT: 512mb
      # ── Red y moneda ──
      COIN_NAME: ETH
      COIN: ETH
      DISABLE_MARKET: 'true'
      # ── API ──
      PORT: 4000
      API_V1_READ_METHODS_DISABLED: 'false'
      API_V1_WRITE_METHODS_DISABLED: 'false'
      # ── Microservicios (deshabilitados para instalación mínima) ──
      MICROSERVICE_VISUALIZE_SOL2UML_ENABLED: 'false'
      MICROSERVICE_SIG_PROVIDER_ENABLED: 'false'
      NFT_MEDIA_HANDLER_ENABLED: 'false'
      # ── Panel y cuentas ──
      ADMIN_PANEL_ENABLED: 'false'
      ACCOUNT_ENABLED: 'false'
      ACCOUNT_REDIS_URL: redis://blockscout-redis:6379
      # ── Logging ──
      DISABLE_FILE_LOGGING: 'true'
      HEART_BEAT_TIMEOUT: 30
    networks:
      - besu_network
    volumes:
      - ./blockscout/logs/:/app/logs/

  blockscout-frontend:
    image: ghcr.io/blockscout/frontend:latest
    pull_policy: always
    container_name: blockscout-frontend
    restart: always
    depends_on:
      - blockscout-backend
    environment:
      NEXT_PUBLIC_API_HOST: ${BLOCKSCOUT_DOMAIN}
      NEXT_PUBLIC_API_PROTOCOL: https
      NEXT_PUBLIC_API_BASE_PATH: /
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: wss
      NEXT_PUBLIC_APP_HOST: ${BLOCKSCOUT_DOMAIN}
      NEXT_PUBLIC_APP_PROTOCOL: https
      NEXT_PUBLIC_NETWORK_NAME: "UTN Credential Chain"
      NEXT_PUBLIC_NETWORK_SHORT_NAME: "UTN-Besu"
      NEXT_PUBLIC_NETWORK_ID: 2018
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: Ether
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: ETH
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: 18
      NEXT_PUBLIC_IS_TESTNET: 'true'
      NEXT_PUBLIC_HOMEPAGE_CHARTS: "['daily_txs']"
      NEXT_PUBLIC_API_SPEC_URL: https://raw.githubusercontent.com/blockscout/blockscout-api-v2-swagger/main/swagger.yaml
    networks:
      - besu_network

  blockscout-proxy:
    image: nginx:alpine
    container_name: blockscout-proxy
    depends_on:
      - blockscout-backend
      - blockscout-frontend
    volumes:
      - "./blockscout/proxy:/etc/nginx/templates"
    environment:
      BACK_PROXY_PASS: http://blockscout-backend:4000
      FRONT_PROXY_PASS: http://blockscout-frontend:3000
    networks:
      - besu_network
      - dokploy-network
    restart: unless-stopped

  # ===================================================================
  # Controller Python
  # ===================================================================
  python-controller:
    build:
      context: ./backend
      dockerfile: Dockerfile.controller
    container_name: python-controller
    # El puerto se expone a través de Traefik
    environment:
      - ISSUER_URL=${ISSUER_URL}
      - OPENID_PRIVATE_KEY_PATH=/run/secrets/openid_private_key
      - OPENID_PUBLIC_KEY_PATH=/run/secrets/openid_public_key
      # Capa de Blockchain Web3 (Besu EVM)
      - BESU_RPC_URL=http://besu-node:8545
      - BLOCKCHAIN_EXPLORER_URL=https://${BLOCKSCOUT_DOMAIN}
      - ADMIN_BOOTSTRAP_TOKEN=${ADMIN_BOOTSTRAP_TOKEN}
      # Portal de Credenciales
      - PORTAL_DB_URL=postgresql://${PORTAL_DB_USER}:${PORTAL_DB_PASSWORD}@portal-db:5432/${PORTAL_DB_NAME}
      - MOODLE_DB_READONLY_URL=postgresql://${MOODLE_DB_READONLY_USER}:${MOODLE_DB_READONLY_PASSWORD}@moodle-db:5432/${MOODLE_DB_NAME}
      - PORTAL_JWT_SECRET=${PORTAL_JWT_SECRET}
      - MOODLE_PORTAL_JWT_SECRET=${MOODLE_PORTAL_JWT_SECRET}
      - PORTAL_FRONTEND_URL=${PORTAL_FRONTEND_URL}
    volumes:
      - ${OPENID_PRIVATE_KEY_PATH}:/run/secrets/openid_private_key:ro
      - ${OPENID_PUBLIC_KEY_PATH}:/run/secrets/openid_public_key:ro
    depends_on:
      besu-node:
        condition: service_healthy
      portal-db:
        condition: service_started
    networks:
      - moodle_network
      - besu_network
      - dokploy-network # Conectar a la red del proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.controller.rule=Host(`${CONTROLLER_DOMAIN}`)"
      - "traefik.http.routers.controller.entrypoints=websecure"
      - "traefik.http.routers.controller.tls.certresolver=letsencrypt" # Dokploy gestiona esto
      - "traefik.http.services.controller.loadbalancer.server.port=3000"

  # ===================================================================
  # Aplicación Moodle
  # ===================================================================
  moodle-app:
    build:
      context: ./moodle
      dockerfile: Dockerfile
    container_name: moodle-app
    # El puerto se expone a través de Traefik
    environment:
      MOODLE_DB_TYPE: pgsql
      MOODLE_DB_HOST: moodle-db
      MOODLE_DB_PORT: 5432
      MOODLE_DB_NAME: ${MOODLE_DB_NAME}
      MOODLE_DB_USER: ${MOODLE_DB_USER}
      MOODLE_DB_PASS: ${MOODLE_DB_PASSWORD}
      # Fuerza HTTPS
      MOODLECFG_wwwroot: ${MOODLECFG_WWWROOT}
      MOODLECFG_sslproxy: ${MOODLECFG_SSLPROXY}

    volumes:
      - moodle_data:/var/www/moodledata
    depends_on:
      - moodle-db
    networks:
      - moodle_network
      - dokploy-network # Conectar a la red del proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.moodle.rule=Host(`${MOODLE_DOMAIN}`)"
      - "traefik.http.routers.moodle.entrypoints=websecure"
      - "traefik.http.routers.moodle.tls.certresolver=letsencrypt" # Dokploy gestiona esto
      - "traefik.http.services.moodle.loadbalancer.server.port=80"

  # ===================================================================
  # Base de datos de Moodle
  # ===================================================================
  moodle-db:
    image: postgres:15-alpine
    container_name: moodle-db
    environment:
      POSTGRES_DB: ${MOODLE_DB_NAME}
      POSTGRES_USER: ${MOODLE_DB_USER}
      POSTGRES_PASSWORD: ${MOODLE_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --lc-collate=C --lc-ctype=C'
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/moodle-db-init:/docker-entrypoint-initdb.d:ro
    networks:
      - moodle_network
    restart: unless-stopped
    ports:
      - "${MOODLE_DB_PORT_EXT}:5432"

  # ===================================================================
  # Base de datos del Portal de Credenciales
  # ===================================================================
  portal-db:
    image: postgres:15-alpine
    container_name: portal-db
    environment:
      POSTGRES_DB: ${PORTAL_DB_NAME}
      POSTGRES_USER: ${PORTAL_DB_USER}
      POSTGRES_PASSWORD: ${PORTAL_DB_PASSWORD}
    volumes:
      - portal_db_data:/var/lib/postgresql/data
    networks:
      - moodle_network
    restart: unless-stopped
